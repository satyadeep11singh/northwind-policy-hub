<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthWind Policy Hub — Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: #1e293b;
      border-radius: 1rem;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .badge {
      display: inline-block;
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <div class="badge">Service Unavailable</div>
    <h1>We'll be right back</h1>
    <p>NorthWind Policy Hub is temporarily unavailable while we perform maintenance. Our team has been notified and is working to restore service.</p>
    <p style="font-size:0.8rem; color:#64748b;">If this persists, please contact your system administrator.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
